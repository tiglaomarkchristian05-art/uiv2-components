<!DOCTYPE html>

<html class="light" lang="en"><head>
<link href="../app.css" rel="stylesheet"/>
<script src="../app.js" defer></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Authentication Card Prototype</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Public+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body { font-family: 'Inter', sans-serif; }
        .label-text { font-family: 'Public Sans', sans-serif; }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4">
<!-- Authentication Card -->
<div class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 p-8">
<!-- Header -->
<div class="mb-8 text-center">
<h1 class="text-2xl font-headline font-bold text-on-surface">Sign In</h1>
<p class="text-on-surface-variant font-body text-sm mt-2">Access your account to continue.</p>
</div>
<!-- Form -->
<form class="space-y-6" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div>
<label class="block label-text text-sm font-medium text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block label-text text-sm font-medium text-on-surface-variant mb-1.5" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-xl" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 border border-outline-variant rounded-lg bg-surface-container-lowest text-on-surface placeholder-on-surface-variant/50 focus:ring-2 focus:ring-primary focus:border-primary transition-colors sm:text-sm" id="password" name="password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface transition-colors" onclick="togglePasswordVisibility()" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility" id="visibility-icon">visibility</span>
</button>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface-container-lowest" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block text-sm text-on-surface-variant label-text" for="remember-me">
                        Remember me
                    </label>
</div>
<div class="text-sm">
<a class="font-medium text-primary hover:text-primary-container transition-colors label-text" href="../forgot_password_card_component_standard/code.html" id="forgot-password-link">
                        Forgot password?
                    </a>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-on-primary bg-primary hover:bg-primary-container focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all active:scale-[0.98]" type="submit">
                    Sign In
                </button>
</div>
</form>
<!-- Back to System Hub link -->
<div class="mt-6 pt-6 border-t border-outline-variant/30 text-center">
<a class="inline-flex items-center justify-center gap-1.5 text-xs font-medium text-on-surface-variant hover:text-primary transition-colors" href="../module_selector/code.html" id="back-to-hub-link">
<span class="material-symbols-outlined text-[16px]">arrow_back</span>
                Back to System Hub
            </a>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const subsystem = params.get('subsystem');
    if (subsystem) {
        const forgotLink = document.getElementById('forgot-password-link');
        if (forgotLink) forgotLink.href = `../forgot_password_card_component_standard/code.html?subsystem=${encodeURIComponent(subsystem)}`;
    }
});

document.querySelector('form').addEventListener('submit', (e) => {
    e.preventDefault();
    const params = new URLSearchParams(window.location.search);
    const subsystem = params.get('subsystem') || 'client-management';
    window.location.href = `../mfa_otp_verification_card_standard/code.html?subsystem=${encodeURIComponent(subsystem)}`;
});
</script>
</body></html>
