<!DOCTYPE html>

<html lang="en"><head>
<link href="../app.css" rel="stylesheet"/>
<script src="../app.js" defer></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Forgot Password</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&amp;family=Public+Sans:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-surface-container-low min-h-screen flex items-center justify-center p-4 font-body text-on-surface antialiased">
<!-- Forgot Password Card -->
<main class="w-full max-w-md bg-surface-container-lowest rounded-xl shadow-lg border border-outline-variant/30 p-8 sm:p-10 transition-all duration-300 hover:shadow-xl">
<!-- Header -->
<div class="mb-8 text-center sm:text-left">
<h1 class="font-headline text-2xl font-bold tracking-tight text-on-surface mb-3">Forgot your password?</h1>
<p class="text-on-surface-variant text-sm leading-relaxed">
                No problem. Just let us know your email address and we will email you a password reset link that will allow you to choose a new one.
            </p>
</div>
<!-- Form -->
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-sm font-semibold text-on-surface" for="email">Email</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl">mail</span>
</div>
<input autofocus="" class="block w-full pl-10 pr-3 py-2.5 border border-outline-variant rounded-lg bg-surface-bright text-on-surface placeholder:text-outline-variant focus:ring-2 focus:ring-primary-container focus:border-primary-container sm:text-sm transition-shadow duration-200" id="email" name="email" placeholder="you@example.com" required="" type="email"/>
</div>
</div>
<!-- Submit Button -->
<div>
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-on-primary bg-primary-container hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-colors duration-200 active:scale-[0.98]" type="submit">
                    Email Password Reset Link
                </button>
</div>
</form>
<!-- Footer / Back Link -->
<div class="mt-8 text-center">
<a class="inline-flex items-center justify-center font-label text-sm font-medium text-primary hover:text-primary-container transition-colors duration-200 group" href="../authentication_card_component_standard/code.html" id="back-to-login-link">
<span class="material-symbols-outlined text-lg mr-1 group-hover:-translate-x-1 transition-transform duration-200">arrow_back</span>
                Back to login
            </a>
</div>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const subsystem = params.get('subsystem');
    if (subsystem) {
        const backLink = document.getElementById('back-to-login-link');
        if (backLink) backLink.href = `../authentication_card_component_standard/code.html?subsystem=${encodeURIComponent(subsystem)}`;
    }
});

document.querySelector('form').addEventListener('submit', (e) => {
    e.preventDefault();
    const params = new URLSearchParams(window.location.search);
    const subsystem = params.get('subsystem') || 'client-management';
    window.location.href = `../reset_password_card_component_standard/code.html?subsystem=${encodeURIComponent(subsystem)}`;
});
</script>
</body></html>
