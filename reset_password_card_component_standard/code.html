<!DOCTYPE html>

<html lang="en"><head>
<link href="../app.css" rel="stylesheet"/>
<script src="../app.js" defer></script>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Reset Password Component</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=Public+Sans:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="font-body bg-surface-container text-on-surface antialiased min-h-screen flex items-center justify-center p-4 sm:p-8">
<main class="w-full max-w-md">
<!-- Reset Password Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0_8px_30px_rgb(0,0,0,0.04)] border border-outline-variant/30 p-8 sm:p-10">
<div class="mb-8 text-center">
<div class="inline-flex items-center justify-center w-12 h-12 rounded-full bg-primary-container/10 text-primary-container mb-4">
<span class="material-symbols-outlined text-2xl" data-icon="lock_reset">lock_reset</span>
</div>
<h1 class="font-headline text-2xl font-bold text-on-surface tracking-tight mb-2">Reset Password</h1>
<p class="text-on-surface-variant text-sm">Please enter your new password below to regain access to your account.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<!-- Email Field (Read-only/Prefilled) -->
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg text-on-surface text-sm focus:ring-0 focus:border-outline-variant opacity-70 cursor-not-allowed transition-colors" id="email" name="email" readonly="" type="email" value="alex.designer@example.com"/>
</div>
</div>
<!-- New Password Field -->
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-1.5" for="new-password">New Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-10 py-2.5 bg-surface border border-outline-variant rounded-lg text-on-surface text-sm focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none" id="new-password" name="new-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
<button class="absolute inset-y-0 right-0 pr-3 flex items-center text-outline hover:text-on-surface focus:outline-none transition-colors" onclick="togglePassword('new-password', 'toggle-icon-1')" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility_off" id="toggle-icon-1">visibility_off</span>
</button>
</div>
<p class="mt-1.5 text-xs text-outline">Must be at least 8 characters long.</p>
</div>
<!-- Confirm Password Field -->
<div>
<label class="block text-sm font-medium text-on-surface-variant mb-1.5" for="confirm-password">Confirm Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]" data-icon="lock_check">lock_clock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface border border-outline-variant rounded-lg text-on-surface text-sm focus:ring-2 focus:ring-primary-container/20 focus:border-primary-container transition-all outline-none" id="confirm-password" name="confirm-password" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required="" type="password"/>
</div>
</div>
<!-- Submit Button -->
<div class="pt-2">
<button class="w-full flex justify-center items-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-semibold text-surface-container-lowest bg-primary-container hover:bg-primary-container/90 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-container transition-all duration-200" type="submit">
                        Update Password
                    </button>
</div>
</form>
<div class="mt-6 text-center">
<a class="text-sm font-medium text-primary-container hover:text-primary transition-colors flex items-center justify-center gap-1" href="../authentication_card_component_standard/code.html" id="back-to-login-link">
<span class="material-symbols-outlined text-[18px]" data-icon="arrow_back">arrow_back</span>
                    Back to login
                </a>
</div>
</div>
</main>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const params = new URLSearchParams(window.location.search);
    const subsystem = params.get('subsystem');
    if (subsystem) {
        const backLink = document.getElementById('back-to-login-link');
        if (backLink) backLink.href = `../authentication_card_component_standard/code.html?subsystem=${encodeURIComponent(subsystem)}`;
    }
});

document.querySelector('form').addEventListener('submit', (e) => {
    e.preventDefault();
    const params = new URLSearchParams(window.location.search);
    const subsystem = params.get('subsystem') || 'client-management';
    window.location.href = `../authentication_card_component_standard/code.html?subsystem=${encodeURIComponent(subsystem)}`;
});
</script>
</body></html>
